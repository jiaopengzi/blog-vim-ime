# Description : GitHub Actions 工作流文件, 用于构建和发布 blog-vim-ime 的 Windows 产物.

name: Build blog-vim-ime

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name to release, optional when manually triggering."
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read Go version from go.mod
        id: read_go
        shell: pwsh
        run: |
          $match = Select-String -Path go.mod -Pattern '^go\s+(.+)$' | Select-Object -First 1
          if ($null -eq $match) {
            $goVersion = '1.26.3'
          } else {
            $goVersion = $match.Matches[0].Groups[1].Value
          }
          "GOV=$goVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GOV }}

      - name: Prepare dependencies
        shell: pwsh
        run: |
          go mod download
          go install github.com/akavel/rsrc@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run shared build script
        shell: pwsh
        run: |
          .\run.ps1 -Choice 7

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $tag = $env:GITHUB_REF.Substring(10)
          } elseif (-not [string]::IsNullOrWhiteSpace('${{ github.event.inputs.release_tag }}')) {
            $tag = '${{ github.event.inputs.release_tag }}'
          } else {
            $tag = '${{ github.ref_name }}'
          }

          $safeTag = $tag -replace '[\\/:*?"<>|\s]+', '-'
          Compress-Archive -Path .\bin\* -DestinationPath ".\dist\${safeTag}-windows.zip" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-vim-ime-windows
          path: dist/*.zip

      - name: Create release and upload assets
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
